<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Check</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: #f4f4f9;
      color: #333;
    }
    .card {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 400px;
    }
    h1 { color: #d9534f; }
    #stat-message {
      font-weight: bold;
      margin: 1rem 0;
      color: #555;
    }
    #game-container {
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid #eee;
    }
    button {
      background-color: #5cb85c;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 1rem;
    }
    button:hover { background-color: #4cae4c; }
    #win-game {
        width: 100%;
        padding: 12px;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 8px;
        background-color: #ccc;
        color: #666;
        transition: all 0.3s ease;
        margin-top:8px;
    }

    /* This class gets added via JS once the puzzle is won */
    #win-game.btn-active {
      cursor: pointer;
      background-color: #27ae60;
      color: white;
      box-shadow: 0 4px 15px rgba(39, 174, 96, 0.3);
    }

    #win-game.btn-active:hover {
      background-color: #2ecc71;
      transform: translateY(-2px);
    }
    /* Add to your blocker CSS */
    .puzzle-tile {
      transition: transform 0.1s ease, background-color 0.2s;
    }

    .puzzle-tile:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Stop!</h1>
    <div id="challenge-area">
      <h2>Complete the Challenge</h2>
      <p id="stat-message"></p>
      
      <div id="game-container" style="margin: 20px auto; width: fit-content;">
        </div>

      <button id="win-game" disabled>Complete the puzzle to unlock</button>
    </div>
  </div>

  <script type="module" src="blocker.js"></script>
</body>
</html>
