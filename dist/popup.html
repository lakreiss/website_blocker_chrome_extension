<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; padding: 15px; font-family: sans-serif; }
    input { width: 100%; padding: 8px; box-sizing: border-box; margin-bottom: 10px; }
    button { width: 100%; cursor: pointer; padding: 8px; background: #007bff; color: white; border: none; border-radius: 4px; }
    ul { list-style: none; padding: 0; margin-top: 15px; }
    li { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 14px; }
    .delete-btn { color: red; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>
  <h3>Block a Site</h3>
  <input type="text" id="site-input" placeholder="e.g. reddit.com">
  <button id="save-btn">Add to Blocklist</button>
  
  <ul id="site-list"></ul>

  <script type="module" src="popup.js"></script>
</body>
</html>
